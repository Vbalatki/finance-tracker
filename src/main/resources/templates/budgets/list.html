<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Мои бюджеты</title>
    <div th:replace="~{layout/head :: head}"></div>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-pie-chart"></i> Бюджеты</h1>
        <a th:href="@{/budgets/create}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Добавить бюджет
        </a>
    </div>

    <!-- Сообщения -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Список бюджетов -->
    <div th:if="${budgets != null and !budgets.empty}">
        <div class="row">
            <div th:each="budget : ${budgets}" class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0" th:text="${budget.categoryName}">Категория</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <div class="d-flex justify-content-between">
                                <span>Лимит:</span>
                                <strong th:text="${#numbers.formatDecimal(budget.monthlyLimit, 1, 2) + ' ₽'}">0 ₽</strong>
                            </div>
                            <div class="d-flex justify-content-between mt-2">
                                <span>Потрачено:</span>
                                <strong th:text="${#numbers.formatDecimal(budget.currentSpending, 1, 2) + ' ₽'}">0 ₽</strong>
                            </div>
                            <div class="progress mt-2" style="height: 25px;">
                                <div class="progress-bar"
                                     th:class="${budget.currentSpending <= budget.monthlyLimit ? 'bg-success' : 'bg-danger'}"
                                     th:style="'width: ' + ${budget.currentSpending.doubleValue() / budget.monthlyLimit.doubleValue() * 100} + '%;'"
                                     th:attr="aria-valuenow=${budget.currentSpending}, aria-valuemin=0, aria-valuemax=${budget.monthlyLimit}">
                                    <div class="progress-bar" th:style="'width: ' + ${budget.currentSpending * 100 / budget.monthlyLimit} + '%;'"></div>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between mt-2">
                                <span>Осталось:</span>
                                <strong th:text="${#numbers.formatDecimal(budget.monthlyLimit - budget.currentSpending, 1, 2) + ' ₽'}">0 ₽</strong>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent">
                        <div class="btn-group w-100" role="group">
                            <form th:action="@{/budgets/{id}/reset(id=${budget.id})}" method="post" style="display:inline; width:50%;">
                                <button type="submit" class="btn btn-warning w-100" onclick="return confirm('Сбросить потраченную сумму в ноль?')">
                                    <i class="bi bi-arrow-repeat"></i> Сбросить
                                </button>
                            </form>
                            <form th:action="@{/budgets/{id}/delete(id=${budget.id})}" method="post" style="display:inline; width:50%;">
                                <button type="submit" class="btn btn-danger w-100" onclick="return confirm('Удалить бюджет?')">
                                    <i class="bi bi-trash"></i> Удалить
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${budgets == null or budgets.empty}" class="text-center py-5">
        <div class="mb-4">
            <i class="bi bi-pie-chart display-1 text-muted"></i>
        </div>
        <h4 class="text-muted mb-3">У вас пока нет бюджетов</h4>
        <p class="text-muted mb-4">Установите бюджет на категории, чтобы контролировать расходы</p>
        <a th:href="@{/budgets/create}" class="btn btn-primary btn-lg">
            <i class="bi bi-plus-circle"></i> Создать бюджет
        </a>
    </div>
</div>

<div th:replace="~{layout/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
