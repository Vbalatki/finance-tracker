<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Бюджеты</title>
    <th:block th:insert="layout/head :: head"></th:block>
</head>
<body>
<th:block th:insert="layout/head :: header"></th:block>
<th:block th:insert="layout/notifications"></th:block>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-graph-up"></i> Бюджеты</h1>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createBudgetModal">
            <i class="bi bi-plus-circle"></i> Новый бюджет
        </button>
    </div>

    <!-- Текущий месяц -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">
                <i class="bi bi-calendar-month"></i>
                <span th:text="${#temporals.format(currentMonth, 'MMMM yyyy')}">Январь 2024</span>
            </h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <div class="card bg-light">
                        <div class="card-body text-center">
                            <h6 class="card-title">Общий лимит</h6>
                            <h3 class="text-primary" th:text="${#numbers.formatDecimal(totalLimit, 0, 'COMMA', 2, 'POINT') + ' ₽'}">
                                0 ₽
                            </h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-light">
                        <div class="card-body text-center">
                            <h6 class="card-title">Потрачено</h6>
                            <h3 class="text-danger" th:text="${#numbers.formatDecimal(totalSpent, 0, 'COMMA', 2, 'POINT') + ' ₽'}">
                                0 ₽
                            </h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-light">
                        <div class="card-body text-center">
                            <h6 class="card-title">Осталось</h6>
                            <h3 th:class="${totalRemaining.doubleValue() > 0 ? 'text-success' : 'text-danger'}"
                                th:text="${#numbers.formatDecimal(totalRemaining, 0, 'COMMA', 2, 'POINT') + ' ₽'}">
                                0 ₽
                            </h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Список бюджетов -->
    <div class="row">
        <div th:each="budget : ${budgets}" class="col-md-6 col-lg-4 mb-4">
            <div class="card h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <h5 class="card-title" th:text="${budget.category.name}">Категория</h5>
                            <small class="text-muted">Лимит:
                                <span th:text="${#numbers.formatDecimal(budget.monthlyLimit, 0, 'COMMA', 2, 'POINT') + ' ₽'}">
                                        0 ₽
                                    </span>
                            </small>
                        </div>
                        <div class="dropdown">
                            <button class="btn btn-sm btn-outline-secondary dropdown-toggle"
                                    type="button" data-bs-toggle="dropdown">
                                <i class="bi bi-three-dots"></i>
                            </button>
                            <ul class="dropdown-menu">
                                <li>
                                    <button class="dropdown-item" data-bs-toggle="modal"
                                            data-bs-target="#editBudgetModal"
                                            th:data-id="${budget.id}"
                                            th:data-limit="${budget.monthlyLimit}">
                                        <i class="bi bi-pencil"></i> Изменить лимит
                                    </button>
                                </li>
                                <li>
                                    <form th:action="@{'/budgets/' + ${budget.id} + '/reset'}"
                                          method="post"
                                          onsubmit="return confirm('Сбросить траты? Это действие начнет новый месяц.');">
                                        <button type="submit" class="dropdown-item">
                                            <i class="bi bi-arrow-clockwise"></i> Сбросить траты
                                        </button>
                                    </form>
                                </li>
                                <li><hr class="dropdown-divider"></li>
                                <li>
                                    <form th:action="@{'/budgets/' + ${budget.id} + '/delete'}"
                                          method="post"
                                          onsubmit="return confirm('Удалить бюджет?');">
                                        <button type="submit" class="dropdown-item text-danger">
                                            <i class="bi bi-trash"></i> Удалить бюджет
                                        </button>
                                    </form>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <!-- Прогресс бар бюджета -->
                    <div class="mb-3">
                        <div class="d-flex justify-content-between mb-1">
                            <small>Потрачено:
                                <span th:text="${#numbers.formatDecimal(budget.currentSpending, 0, 'COMMA', 2, 'POINT') + ' ₽'}">
                                        0 ₽
                                    </span>
                            </small>
                            <small>
                                <span th:text="${(budget.currentSpending.doubleValue() / budget.monthlyLimit.doubleValue() * 100).intValue()}">0</span>%
                            </small>
                        </div>
                        <div class="progress" style="height: 10px;">
                            <div class="progress-bar"
                                 th:class="${budget.remainingAmount.doubleValue() > 0 ? 'bg-success' : 'bg-danger'}"
                                 th:style="'width: ' + ${Math.min(100, budget.currentSpending.doubleValue() / budget.monthlyLimit.doubleValue() * 100)} + '%;'"
                                 role="progressbar">
                            </div>
                        </div>
                        <div class="d-flex justify-content-between mt-2">
                            <small class="text-muted">
                                Осталось:
                                <span th:class="${budget.remainingAmount.doubleValue() > 0 ? 'text-success' : 'text-danger'}"
                                      th:text="${#numbers.formatDecimal(budget.remainingAmount, 0, 'COMMA', 2, 'POINT') + ' ₽'}">
                                        0 ₽
                                    </span>
                            </small>
                            <small th:if="${budget.remainingAmount.doubleValue() < 0}" class="text-danger">
                                Превышение:
                                <span th:text="${#numbers.formatDecimal(budget.remainingAmount.abs(), 0, 'COMMA', 2, 'POINT') + ' ₽'}">
                                        0 ₽
                                    </span>
                            </small>
                        </div>
                    </div>

                    <!-- Предупреждения -->
                    <div th:if="${budget.currentSpending.doubleValue() / budget.monthlyLimit.doubleValue() > 0.8}"
                         class="alert alert-warning py-2 mb-0">
                        <small>
                            <i class="bi bi-exclamation-triangle"></i>
                            Бюджет почти исчерпан
                        </small>
                    </div>
                    <div th:if="${budget.currentSpending.doubleValue() / budget.monthlyLimit.doubleValue() > 1}"
                         class="alert alert-danger py-2 mb-0">
                        <small>
                            <i class="bi bi-exclamation-octagon"></i>
                            Бюджет превышен!
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Категории без бюджета -->
    <div th:if="${!categoriesWithoutBudget.empty}" class="card">
        <div class="card-header">
            <h5 class="mb-0">Категории без бюджета</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div th:each="category : ${categoriesWithoutBudget}" class="col-md-4 mb-2">
                    <div class="d-flex justify-content-between align-items-center">
                        <span th:text="${category.name}">Категория</span>
                        <button type="button" class="btn btn-sm btn-outline-primary"
                                data-bs-toggle="modal" data-bs-target="#createBudgetForCategoryModal"
                                th:data-category-id="${category.id}"
                                th:data-category-name="${category.name}">
                            <i class="bi bi-plus"></i> Установить бюджет
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Если нет бюджетов -->
    <div th:if="${budgets.empty}" class="text-center py-5">
        <div class="mb-4">
            <i class="bi bi-graph-up display-1 text-muted"></i>
        </div>
        <h4 class="text-muted mb-3">У вас еще нет бюджетов</h4>
        <p class="text-muted mb-4">Установите бюджеты для контроля расходов по категориям</p>
        <button type="button" class="btn btn-primary btn-lg" data-bs-toggle="modal" data-bs-target="#createBudgetModal">
            <i class="bi bi-plus-circle"></i> Установить первый бюджет
        </button>
    </div>
</div>

<!-- Модальные окна -->
<div th:replace="fragments/budget-modals :: budget-modals"></div>

<!-- JavaScript для модальных окон -->
<script th:src="@{/js/budgets.js}"></script>
</body>
</html>
