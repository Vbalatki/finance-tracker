<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Новый бюджет</title>
    <div th:replace="~{layout/head :: head}"></div>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4>Установить бюджет</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/budgets}" th:object="${budgetDto}" method="post">
                        <div class="mb-3">
                            <label for="categoryId" class="form-label">Категория</label>
                            <select class="form-select" id="categoryId" th:field="*{categoryId}" required>
                                <option value="">Выберите категорию</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                            </select>
                            <div th:errors="*{categoryId}" class="text-danger"></div>
                        </div>
                        <div class="mb-3">
                            <label for="monthlyLimit" class="form-label">Месячный лимит (₽)</label>
                            <input type="number" step="0.01" class="form-control" id="monthlyLimit" th:field="*{monthlyLimit}" required>
                            <div th:errors="*{monthlyLimit}" class="text-danger"></div>
                        </div>
                        <!-- currentSpending скрыто, при создании будет 0 -->
                        <input type="hidden" th:field="*{currentSpending}" th:value="0" />
                        <div class="d-flex justify-content-between">
                            <a href="/budgets" class="btn btn-secondary">Отмена</a>
                            <button type="submit" class="btn btn-primary">Сохранить</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
