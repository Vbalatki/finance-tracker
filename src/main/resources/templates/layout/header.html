<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>

</head>
<body>
<div th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Финансовый трекер</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">
                            <i class="bi bi-speedometer2"></i> Дашборд
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/transactions">
                            <i class="bi bi-arrow-left-right"></i> Транзакции
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/accounts">
                            <i class="bi bi-wallet2"></i> Счета
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/categories">
                            <i class="bi bi-tags"></i> Категории
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/budgets">
                            <i class="bi bi-pie-chart"></i> Бюджеты
                        </a>
                    </li>

                    <!-- Кнопка админ-панели (видна только для ADMIN) -->
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link text-warning" href="/admin">
                            <i class="bi bi-shield-lock-fill"></i> Админ панель
                        </a>
                    </li>

                    <li class="nav-item dropdown" th:with="auth=${#authentication}">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown"
                           th:if="${auth != null and auth.authenticated}">
                            <i class="bi bi-person-circle"></i> <span th:text="${auth.name}"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" th:if="${auth != null and auth.authenticated}">
                            <li><a class="dropdown-item" href="/profile"><i class="bi bi-person"></i> Профиль</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="/logout"><i class="bi bi-box-arrow-right"></i> Выход</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- JavaScript для активации текущего пункта меню -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const currentPath = window.location.pathname;
            let activeId = '';

            if (currentPath.includes('/dashboard')) {
                activeId = 'nav-dashboard';
            } else if (currentPath.includes('/accounts')) {
                activeId = 'nav-accounts';
            } else if (currentPath.includes('/transactions')) {
                activeId = 'nav-transactions';
            } else if (currentPath.includes('/budgets')) {
                activeId = 'nav-budgets';
            } else if (currentPath.includes('/categories')) {
                activeId = 'nav-categories';
            }

            if (activeId) {
                const activeElement = document.getElementById(activeId);
                if (activeElement) {
                    activeElement.classList.add('active');
                }
            }
        });
    </script>
</div>
</body>
</html>
