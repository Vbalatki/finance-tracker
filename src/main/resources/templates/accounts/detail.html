<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${account.name} + ' - Финансовый трекер'">Детали счета</title>
    <div th:replace="~{layout/head :: head}"></div>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container mt-4">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/accounts">Счета</a></li>
            <li class="breadcrumb-item active" th:text="${account.name}"></li>
        </ol>
    </nav>

    <!-- Сообщения -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Заголовок -->
    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <h1 class="h3 mb-1" th:text="${account.name}"></h1>
        </div>
        <div>
<!--            <a th:href="@{/accounts/{id}/edit(id=${account.id})}" class="btn btn-outline-primary me-2">-->
<!--                <i class="bi bi-pencil"></i> Редактировать-->
<!--            </a>-->
            <a href="/accounts" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Назад
            </a>
        </div>
    </div>

    <!-- Основная информация -->
    <div class="row">
        <div class="col-md-8">
            <!-- Баланс -->
            <div class="card mb-4">
                <div class="card-body text-center">
                    <h6 class="text-muted mb-2">Текущий баланс</h6>
                    <h2 class="mb-0"
                        th:class="${account.balance > 0 ? 'text-success' : (account.balance < 0 ? 'text-danger' : 'text-muted')}">
                        <span th:text="${formattedBalance}">0 ₽</span>
                    </h2>
                    <small class="text-muted">
                        Валюта:
                        <span th:switch="${account.currency}" class="badge ms-1">
                            <span th:case="RUB" class="bg-success">₽ RUB</span>
                            <span th:case="USD" class="bg-primary">$ USD</span>
                            <span th:case="EUR" class="bg-warning text-dark">€ EUR</span>
                            <span th:case="GBP" class="bg-danger">£ GBP</span>
                            <span th:case="KZT" class="bg-purple">₸ KZT</span>
                            <span th:case="JPY" class="bg-secondary">¥ JPY</span>
                        </span>
                    </small>
                </div>
            </div>

            <!-- Операции -->
            <div class="card mb-4">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Последние операции</h5>
                </div>
                <div class="card-body">
                    <div th:if="${transactions != null and !transactions.isEmpty()}">
                        <div class="list-group list-group-flush">
                            <div th:each="transaction : ${transactions}"
                                 class="list-group-item d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="fw-bold" th:text="${transaction.description} ?: 'Без описания'"></div>
                                    <small class="text-muted"
                                           th:text="${#temporals.format(transaction.createdAt, 'dd.MM.yyyy HH:mm')}"></small>
                                </div>
                                <div>
                                    <span th:class="${transaction.type == 'INCOME'} ? 'text-success' : 'text-danger'">
                                        <span th:if="${transaction.type == 'INCOME'}">+</span>
                                        <span th:if="${transaction.type == 'EXPENSE'}">-</span>
                                        <span th:text="${#numbers.formatDecimal(transaction.amount, 1, 'COMMA', 2, 'POINT')}"></span>
                                        <span th:switch="${account.currency}">
                                            <span th:case="RUB"> ₽</span>
                                            <span th:case="USD"> $</span>
                                            <span th:case="EUR"> €</span>
                                            <span th:case="GBP"> £</span>
                                            <span th:case="KZT"> ₸</span>
                                            <span th:case="JPY"> ¥</span>
                                        </span>
                                    </span>
                                </div>
                            </div>
                        </div>
                        <div class="text-center mt-3">
                            <a th:href="@{/transactions(accountId=${account.id})}"
                               class="btn btn-outline-primary btn-sm">
                                Все операции
                            </a>
                        </div>
                    </div>
                    <div th:if="${transactions == null or transactions.isEmpty()}" class="text-center py-4">
                        <p class="text-muted">Операций нет</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Боковая панель -->
        <div class="col-md-4">
            <!-- Быстрые операции -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0">Быстрые операции</h5>
                </div>
                <div class="card-body">
                    <!-- Пополнение -->
                    <form th:action="@{/accounts/{id}/deposit(id=${account.id})}" method="post" class="mb-3">
                        <div class="input-group">
                            <input type="number"
                                   step="0.01"
                                   min="0.01"
                                   class="form-control"
                                   name="amount"
                                   placeholder="Сумма"
                                   required>
                            <button class="btn btn-success" type="submit">
                                <i class="bi bi-plus-circle"></i> Пополнить
                            </button>
                        </div>
                    </form>

                    <!-- Снятие -->
                    <form th:action="@{/accounts/{id}/withdraw(id=${account.id})}" method="post">
                        <div class="input-group">
                            <input type="number"
                                   step="0.01"
                                   min="0.01"
                                   class="form-control"
                                   name="amount"
                                   placeholder="Сумма"
                                   required>
                            <button class="btn btn-danger" type="submit">
                                <i class="bi bi-dash-circle"></i> Снять
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Информация -->
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Информация</h5>
                </div>
                <div class="card-body">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-muted">ID счета:</span>
                            <span th:text="${account.id}"></span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-muted">Валюта:</span>
                            <span th:switch="${account.currency}" class="fw-bold">
                                <span th:case="RUB" class="text-success">₽ RUB</span>
                                <span th:case="USD" class="text-primary">$ USD</span>
                                <span th:case="EUR" class="text-warning">€ EUR</span>
                                <span th:case="GBP" class="text-danger">£ GBP</span>
                                <span th:case="KZT" class="text-purple">₸ KZT</span>
                                <span th:case="JPY" class="text-secondary">¥ JPY</span>
                            </span>
                        </li>
                    </ul>

                    <!-- Удаление счета -->
                    <div class="mt-3">
                        <form th:action="@{/accounts/{id}/delete(id=${account.id})}"
                              method="post"
                              onsubmit="return confirm('Вы уверены, что хотите удалить этот счет?')">
                            <button type="submit" class="btn btn-outline-danger w-100">
                                <i class="bi bi-trash"></i> Удалить счет
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
