<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Журнал аудита - Админпанель</title>
    <div th:replace="~{layout/head :: head}"></div>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-journal-bookmark-fill"></i> Журнал аудита</h1>
        <a href="/admin" class="btn btn-secondary">← Назад к админ панели</a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Дата</th>
                        <th>Пользователь</th>
                        <th>Действие</th>
                        <th>Сущность</th>
                        <th>ID</th>
                        <th>Детали</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="log : ${logs}">
                        <td> th:text="${#temporals.format(log.createdAt, 'dd.MM.yyyy HH:mm:ss')}"/></td>
                        <td> th:text="${log.username}"/> (<span th:text="${log.userId}"/>)</td>
                        <td><span class="badge" th:class="${log.action == 'CREATE' ? 'bg-success' : (log.action == 'UPDATE' ? 'bg-warning' : 'bg-danger')}"
                                  th:text="${log.action}"></span></td>
                        <td th:text="${log.entityType}"/></td>
                        <td th:text="${log.entityId}"/></td>
                        <td style="word-break: break-word; max-width: 400px;" th:text="${log.details}"/></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer" th:if="${totalPages > 0}">
            <nav aria-label="Пагинация">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'" th:if="${currentPage > 0}">
                        <a class="page-link" th:href="@{/admin/audit(page=${currentPage - 1}, size=50)}">« Предыдущая</a>
                    </li>
                    <li class="page-item disabled"><span class="page-link">Страница <span th:text="${currentPage + 1}"/> из <span th:text="${totalPages}"/></span></li>
                    <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'" th:if="${currentPage + 1 < totalPages}">
                        <a class="page-link" th:href="@{/admin/audit(page=${currentPage + 1}, size=50)}">Следующая »</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
