<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Категории</title>
    <th:block th:insert="layout/head :: head"></th:block>
</head>
<body>
<th:block th:insert="layout/head :: header"></th:block>
<th:block th:insert="layout/notifications"></th:block>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-tags"></i> Категории</h1>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createCategoryModal">
            <i class="bi bi-plus-circle"></i> Новая категория
        </button>
    </div>

    <!-- Список категорий -->
    <div class="row">
        <div th:each="category : ${categories}" class="col-md-6 col-lg-4 mb-4">
            <div class="card h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <h5 class="card-title" th:text="${category.name}">Категория</h5>
                            <span th:if="${category.budget}" class="badge bg-warning">
                                    Бюджет: <span th:text="${#numbers.formatDecimal(category.budget.monthlyLimit, 0, 'COMMA', 2, 'POINT')}">0</span> ₽
                                </span>
                        </div>
                        <div class="dropdown">
                            <button class="btn btn-sm btn-outline-secondary dropdown-toggle"
                                    type="button" data-bs-toggle="dropdown">
                                <i class="bi bi-three-dots"></i>
                            </button>
                            <ul class="dropdown-menu">
                                <li>
                                    <button class="dropdown-item" data-bs-toggle="modal"
                                            data-bs-target="#editCategoryModal"
                                            th:data-id="${category.id}"
                                            th:data-name="${category.name}">
                                        <i class="bi bi-pencil"></i> Редактировать
                                    </button>
                                </li>
                                <li>
                                    <a class="dropdown-item"
                                       th:href="@{'/transactions?categoryId=' + ${category.id}}">
                                        <i class="bi bi-list"></i> Транзакции
                                    </a>
                                </li>
                                <li>
                                    <a class="dropdown-item"
                                       th:if="${category.budget == null}"
                                       th:href="@{'/budgets/create?categoryId=' + ${category.id}}">
                                        <i class="bi bi-graph-up"></i> Установить бюджет
                                    </a>
                                </li>
                                <li><hr class="dropdown-divider"></li>
                                <li>
                                    <form th:action="@{'/categories/' + ${category.id} + '/delete'}"
                                          method="post"
                                          onsubmit="return confirm('Удалить категорию? Все транзакции этой категории станут без категории.');">
                                        <button type="submit" class="dropdown-item text-danger">
                                            <i class="bi bi-trash"></i> Удалить
                                        </button>
                                    </form>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <!-- Статистика по категории -->
                    <div class="mb-3">
                        <div class="d-flex justify-content-between mb-1">
                            <small class="text-muted">Транзакций:</small>
                            <small th:text="${category.transactions != null ? category.transactions.size() : 0}">0</small>
                        </div>
                        <div th:if="${category.budget}" class="mt-3">
                            <div class="d-flex justify-content-between mb-1">
                                <small class="text-muted">Потрачено:</small>
                                <small th:text="${#numbers.formatDecimal(category.budget.currentSpending, 0, 'COMMA', 2, 'POINT') + ' ₽'}">
                                    0 ₽
                                </small>
                            </div>
                            <div class="progress" style="height: 8px;">
                                <div class="progress-bar"
                                     th:class="${category.budget.remainingAmount.doubleValue() > 0 ? 'bg-success' : 'bg-danger'}"
                                     th:style="'width: ' + ${category.budget.currentSpending.doubleValue() / category.budget.monthlyLimit.doubleValue() * 100} + '%;'"
                                     role="progressbar">
                                </div>
                            </div>
                            <small class="text-muted d-block mt-1">
                                Осталось:
                                <span th:text="${#numbers.formatDecimal(category.budget.remainingAmount, 0, 'COMMA', 2, 'POINT') + ' ₽'}">
                                        0 ₽
                                    </span>
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Если нет категорий -->
    <div th:if="${categories.empty}" class="text-center py-5">
        <div class="mb-4">
            <i class="bi bi-tags display-1 text-muted"></i>
        </div>
        <h4 class="text-muted mb-3">У вас еще нет категорий</h4>
        <p class="text-muted mb-4">Создайте категории для организации транзакций</p>
        <button type="button" class="btn btn-primary btn-lg" data-bs-toggle="modal" data-bs-target="#createCategoryModal">
            <i class="bi bi-plus-circle"></i> Создать первую категорию
        </button>
    </div>
</div>

<!-- Модальное окно создания категории -->
<div class="modal fade" id="createCategoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Новая категория</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/categories}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="categoryName" class="form-label">Название категории</label>
                        <input type="text" class="form-control" id="categoryName" name="name" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-primary">Создать</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Модальное окно редактирования категории -->
<div class="modal fade" id="editCategoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Редактировать категорию</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/categories/{id}(id=${categoryId})}" method="post" id="editCategoryForm">
                <input type="hidden" name="_method" value="put">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="editCategoryName" class="form-label">Название категории</label>
                        <input type="text" class="form-control" id="editCategoryName" name="name" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Обработчик для модального окна редактирования
    document.addEventListener('DOMContentLoaded', function() {
        const editModal = document.getElementById('editCategoryModal');
        editModal.addEventListener('show.bs.modal', function(event) {
            const button = event.relatedTarget;
            const categoryId = button.getAttribute('data-id');
            const categoryName = button.getAttribute('data-name');

            const form = document.getElementById('editCategoryForm');
            form.action = form.action.replace('{id}', categoryId);

            document.getElementById('editCategoryName').value = categoryName;
        });
    });
</script>
</body>
</html>
