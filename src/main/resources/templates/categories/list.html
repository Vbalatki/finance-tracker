<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Категории</title>
    <div th:replace="~{layout/head :: head}"></div>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Категории</h1>
        <a href="/categories/new" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Новая категория
        </a>
    </div>

    <div th:if="${success != null}" class="alert alert-success" role="alert">
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error != null}" class="alert alert-danger" role="alert">
        <span th:text="${error}"></span>
    </div>

    <div class="table-responsive">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Транзакций</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="category : ${categories}">
                <td th:text="${category.id}">1</td>
                <td th:text="${category.name}">Категория</td>
                <td th:text="${category.transactionsCount}">0</td>
                <td>
                    <a th:href="@{/categories/{id}/edit(id=${category.id})}" class="btn btn-sm btn-warning">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post"
                          style="display:inline;" onsubmit="return confirm('Удалить категорию?')">
                        <button type="submit" class="btn btn-sm btn-danger">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${categories.isEmpty()}">
                <td colspan="4" class="text-center">Нет категорий. Создайте первую!</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
