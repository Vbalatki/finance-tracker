<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Редактирование категории</title>
  <div th:replace="~{layout/head :: head}"></div>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h4>Редактирование категории</h4>
        </div>
        <div class="card-body">
          <form th:action="@{'/categories/' + ${categoryDto.id} + '/edit'}" method="post">
            <div class="mb-3">
              <label for="name" class="form-label">Название категории</label>
              <input type="text" class="form-control" id="name" name="name" th:value="${categoryDto.name}" required>
            </div>
            <div class="d-flex justify-content-between">
              <a href="/categories" class="btn btn-secondary">Отмена</a>
              <button type="submit" class="btn btn-primary">Сохранить</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
