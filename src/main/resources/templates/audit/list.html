<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Аудит</title>
    <div th:replace="~{layout/head :: head}"></div>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container mt-4">
    <h1><i class="bi bi-journal-bookmark-fill"></i> Журнал аудита</h1>

    <div class="card mt-3">
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Пользователь</th>
                    <th>Действие</th>
                    <th>Сущность</th>
                    <th>ID сущности</th>
                    <th>Дата и время</th>
                    <th>Детали</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="log : ${logs}">
                    <td th:text="${log.id}"></td>
                    <td th:text="${log.username}"></td>
                    <td th:text="${log.action}"></td>
                    <td th:text="${log.entityType}"></td>
                    <td th:text="${log.entityId}"></td>
                    <td th:text="${#temporals.format(log.createdAt, 'dd.MM.yyyy HH:mm:ss')}"></td>
                    <td th:text="${log.details}"></td>
                </tr>
                <tr th:if="${logs.empty}">
                    <td colspan="7" class="text-center">Нет записей аудита</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
