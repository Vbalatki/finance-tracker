# ================================
# ФИНАНСОВЫЙ ТРЕКЕР - PostgreSQL КОНФИГ
# ================================

spring:
  application:
    name: finance-tracker

  # ======= НАСТРОЙКИ PostgreSQL =======
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:finance_tracker}
    username: ${DB_USERNAME:finance_tracker}
    password: ${DB_PASSWORD:finance_tracker}
    driver-class-name: org.postgresql.Driver

    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  # ======= НАСТРОЙКИ LIQUIBASE =======
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    # default-schema — куда попадают таблицы приложения (совпадает со
    # schema = "finance_tracker" в @Table у сущностей).
    # liquibase-schema — где Liquibase хранит свои служебные таблицы
    # DATABASECHANGELOG/DATABASECHANGELOGLOCK; оставляем в public, так как
    # эта схема гарантированно существует ещё до первого запуска Liquibase
    # (сама finance_tracker создаётся первым же changeset'ом V0).
    default-schema: finance_tracker
    liquibase-schema: public

  # ======= НАСТРОЙКИ JPA/HIBERNATE =======
  jpa:
    hibernate:
      # схема создаётся Liquibase, Hibernate её не трогает
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: false
    show-sql: true
    open-in-view: false

  # ======= НАСТРОЙКИ THYMELEAF =======
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    check-template: true
    check-template-location: true
    enabled: true

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

  cache:
    type: none

# ======= НАСТРОЙКИ СЕРВЕРА =======
server:
  address: 0.0.0.0
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    max-threads: 200
    min-spare-threads: 10
    connection-timeout: 5000

# ======= КОНФИГУРАЦИЯ ЛОГИРОВАНИЯ =======
# Уровни DEBUG/TRACE уместны локально, но не в контейнере/проде —
# при необходимости переопределите через application-prod.yaml
logging:
  level:
    org.springframework.security: INFO
    com.finance.finance_tracker: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    liquibase: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{40} - %msg%n"

debug: false
trace: false

# ======= ПРОВЕРКА ЗДОРОВЬЯ / МЕТРИКИ =======
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    disable-swagger-default-url: true
  paths-to-match: /api/**
  packages-to-scan: com.finance.finance_tracker.controller

# ======= Внешний API курсов валют =======
currencyapi:
  url: "https://v6.exchangerate-api.com/v6/"
  key: ${CURRENCY_API_KEY:}
