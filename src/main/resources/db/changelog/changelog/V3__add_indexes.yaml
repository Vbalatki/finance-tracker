            columns:
              - column:
                  name: account_id
                  descending: false

        - createIndex:
            tableName: transactions
            indexName: idx_transactions_category_id
            columns:
              - column:
                  name: category_id
                  descending: false

        - createIndex:
            tableName: transactions
            indexName: idx_transactions_created_at
            columns:
              - column:
                  name: created_at
                  descending: true

        - createIndex:
            tableName: transactions
            indexName: idx_transactions_type
            columns:
              - column:
                  name: type
                  descending: false