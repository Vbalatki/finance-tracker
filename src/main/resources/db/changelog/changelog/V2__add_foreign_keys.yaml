databaseChangeLog:
  - changeSet:
      id: 10
      author: dmitriy-sidorov
      changes:
        - addForeignKeyConstraint:
            baseTableSchemaName: finance_tracker
            baseTableName: accounts
            baseColumnNames: user_id
            referencedTableSchemaName: finance_tracker
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_accounts_user
            onDelete: CASCADE
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseTableSchemaName: finance_tracker
            baseTableName: categories
            baseColumnNames: user_id
            referencedTableSchemaName: finance_tracker
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_categories_user
            onDelete: CASCADE
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseTableSchemaName: finance_tracker
            baseTableName: budgets
            baseColumnNames: user_id
            referencedTableSchemaName: finance_tracker
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_budgets_user
            onDelete: CASCADE
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseTableSchemaName: finance_tracker
            baseTableName: budgets
            baseColumnNames: category_id
            referencedTableSchemaName: finance_tracker
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_budgets_category
            onDelete: CASCADE
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseTableSchemaName: finance_tracker
            baseTableName: transactions
            baseColumnNames: account_id
            referencedTableSchemaName: finance_tracker
            referencedTableName: accounts
            referencedColumnNames: id
            constraintName: fk_transactions_account
            onDelete: CASCADE
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseTableSchemaName: finance_tracker
            baseTableName: transactions
            baseColumnNames: category_id
            referencedTableSchemaName: finance_tracker
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_transactions_category
            onDelete: SET NULL
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseTableSchemaName: finance_tracker
            baseTableName: user_roles
            baseColumnNames: user_id
            referencedTableSchemaName: finance_tracker
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_roles_user
            onDelete: CASCADE
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseTableSchemaName: finance_tracker
            baseTableName: user_roles
            baseColumnNames: role_id
            referencedTableSchemaName: finance_tracker
            referencedTableName: roles
            referencedColumnNames: id
            constraintName: fk_user_roles_role
            onDelete: CASCADE
            onUpdate: CASCADE
