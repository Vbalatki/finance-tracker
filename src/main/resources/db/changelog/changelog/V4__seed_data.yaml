                  name: name
                  value: Иван
              - column:
                  name: surname
                  value: Иванов
              - column:
                  name: birthday
                  value: "1990-01-01"
              - column:
                  name: email
                  value: ivan@example.com
              - column:
                  name: password
                  value: "$2a$10$X5h5BzR1wvPq3wZ2Q5YzY.OwJkLmN8Q7PqR5sT8uVwXyZ3A4B6C7D8E9F0" # encoded 'password'
              - column:
                  name: active
