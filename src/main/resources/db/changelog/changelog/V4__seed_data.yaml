              - column:
                  name: active
                  valueBoolean: true

  - changeSet:
      id: 14
      author: claude-migration
      comment: >
        ROLE_ADMIN и ROLE_USER — стандартные роли, защищённые от изменения/удаления
        в RoleServiceImpl (см. DataConstants.DEFAULT_ROLE_ADMIN/DEFAULT_ROLE_USER).
        Раньше ничего их не создавало — первый /admin запрос упал бы, так как
        роль ROLE_ADMIN физически не существовала бы ни у одного пользователя.
      changes:
        - insert:
            schemaName: finance_tracker
            tableName: roles
            columns:
              - column:
                  name: name
                  value: ROLE_ADMIN
        - insert:
            schemaName: finance_tracker
            tableName: roles
            columns:
              - column:
                  name: name
                  value: ROLE_USER

  - changeSet:
      id: 15
      author: claude-migration
      comment: Иван (id=1) — администратор, Мария (id=2) — обычный пользователь.
      changes:
        - insert:
            schemaName: finance_tracker
            tableName: user_roles
            columns:
              - column:
                  name: user_id
                  valueNumeric: 1
              - column:
                  name: role_id
                  valueNumeric: 1
        - insert:
            schemaName: finance_tracker
            tableName: user_roles
            columns:
              - column:
                  name: user_id
                  valueNumeric: 1
              - column:
                  name: role_id
                  valueNumeric: 2
        - insert:
