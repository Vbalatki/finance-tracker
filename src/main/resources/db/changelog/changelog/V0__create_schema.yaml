databaseChangeLog:
  - changeSet:
      id: 1
      author: claude-migration
      comment: >
        Создаёт схему finance_tracker. В MySQL "схема" фактически совпадает
        с именем базы данных (которая уже задаётся через JDBC URL), поэтому
        для MySQL этот changeset избыточен, но безвреден. В PostgreSQL схема —
        отдельное пространство имён внутри базы данных, и его нужно создать
        явно до того, как в него можно будет класть таблицы.
      changes:
        - sql:
            sql: CREATE SCHEMA IF NOT EXISTS finance_tracker;
            dbms: postgresql
