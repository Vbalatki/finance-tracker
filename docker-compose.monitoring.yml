# Стек мониторинга: Prometheus + Grafana.
# Само Spring Boot приложение здесь НЕ запускается — предполагается, что
# оно уже работает на хосте (например, через ./mvnw spring-boot:run) и
# отдаёт метрики на http://localhost:8080/actuator/prometheus.
#
# Запуск:
#   docker compose -f docker-compose.monitoring.yml up -d
#
# Grafana:   http://localhost:3000  (admin / admin, поменять при первом входе)
# Prometheus: http://localhost:9090

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: finance-tracker-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    # Нужно, чтобы Prometheus из контейнера видел приложение на хосте.
    # На Docker Desktop (Mac/Windows) host.docker.internal работает "из коробки",
    # на Linux нужен явный extra_hosts.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: finance-tracker-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

volumes:
  prometheus-data:
  grafana-data:
